                // Формуємо вміст кнопки (ІЗ КНОПКАМИ ІНФО ТА ✏️ КОМЕНТАРЕМ)
                clickableArea.innerHTML = `
                    <div class="option-name">${nestedPrefix}${renderInlineMarkdown(item.name)}</div>
                    
                    <div style="position: absolute; top: 4px; right: 7px; display: flex; gap: 0px; z-index: 2;">
                        ${item.info ? `<span class="info-icon-btn" style="color:var(--text-desc); font-size:12.5px; opacity:0.6; font-weight:800; cursor:pointer; padding: 2px 6px; display:inline-block; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);">ⓘ</span>` : ''}
                        ${isSelected ? `<span class="note-icon-btn" style="font-size:10.5px; opacity:0.9; cursor:pointer; padding: 2px 4px;">✏️</span>` : ''}
                    </div>

                    ${item.info ? `<div class="option-info">${renderInlineMarkdown(item.info)}</div>` : ''}
                    ${item.desc ? `<div class="option-desc" style="text-align:left;">${renderInlineMarkdown(item.desc)}</div>` : ''}
                    ${tagsHtml}
                `;
                btn.appendChild(clickableArea);


                // 🟢 ОЖИВЛЯЄМО КНОПКИ ІНФО (ⓘ) - З ДИНАМІКОЮ
                const infoIcon = clickableArea.querySelector('.info-icon-btn');
                if (infoIcon) {
                    infoIcon.onclick = (e) => {
                        e.stopPropagation(); 
                        const infoDiv = clickableArea.querySelector('.option-info');
                        const isOpen = infoDiv.classList.toggle('open'); // Плавне відкриття
                        
                        // Кнопка реагує на натискання: збільшується та стає зеленою
                        infoIcon.style.opacity = isOpen ? '1' : '0.6';
                        infoIcon.style.color = isOpen ? 'var(--accent)' : 'var(--text-desc)';
                        infoIcon.style.transform = isOpen ? 'scale(1.15)' : 'scale(1)';
                    };
                }

                // 🟢 ОЖИВЛЯЄМО КНОПКИ КОМЕНТАРІВ (✏️)
                const noteIcon = clickableArea.querySelector('.note-icon-btn');
                if (noteIcon) {
                    noteIcon.onclick = (e) => {
                        e.stopPropagation(); // Щоб картка не знімала виділення
                        const noteWrap = btn.querySelector('.card-note-wrap');
                        if (noteWrap) {
                            noteWrap.style.display = noteWrap.style.display === 'block' ? 'none' : 'block';
                            if (noteWrap.style.display === 'block') noteWrap.querySelector('input').focus();
                        }
                    };
                }

                const scaleDiv = document.createElement('div');
                scaleDiv.className = 'scale-container';
                scaleDiv.onclick = (e) => e.stopPropagation();

                // 1. Рядок з модифікаторами (Multi-select префікси)
                if (item.mods && item.mods.length > 0) {
                    const modsRow = document.createElement('div');
                    modsRow.className = 'mods-row';
                    item.mods.forEach(modVal => {
                        const modBtn = document.createElement('div');
                        const isActive = isSelected && selectedItems[itemId].mods && selectedItems[itemId].mods.includes(modVal);
                        modBtn.className = `mod-btn ${isActive ? 'selected' : ''}`;
                        modBtn.innerText = modVal;
                        // Заміни рядок: modBtn.onclick = () => toggleMod(itemId, category, item.name, modVal);
modBtn.onclick = () => toggleMod(itemId, category, item.name, modVal, item.parent);
                        modsRow.appendChild(modBtn);
                    });
                    scaleDiv.appendChild(modsRow);
                }

                // 2. Рядок зі шкалою (Single-select 1-5)
                const scaleRow = document.createElement('div');
                scaleRow.className = 'scale-row';
                const tagsToUse = blockData.tags || [1, 2, 3, 4, 5];
                tagsToUse.forEach(tagVal => {
                    const scaleBtn = document.createElement('div');
                    scaleBtn.className = `scale-btn ${currentScale === String(tagVal) ? 'selected' : ''}`;
                    if (isNaN(tagVal)) scaleBtn.classList.add('text-tag'); 
                    scaleBtn.innerText = tagVal;
                    // Заміни рядок: scaleBtn.onclick = () => setScale(itemId, category, item.name, String(tagVal));
scaleBtn.onclick = () => setScale(itemId, category, item.name, String(tagVal), item.parent);
                    scaleRow.appendChild(scaleBtn);
                });
                scaleDiv.appendChild(scaleRow);

                btn.appendChild(scaleDiv);

                // ДОДАНО: Поле для коментаря (в самому низу картки)
                if (isSelected) {
                    const cardNoteWrap = document.createElement('div');
                    cardNoteWrap.className = 'card-note-wrap';
                    cardNoteWrap.style.display = currentNote ? 'block' : 'none';
                    cardNoteWrap.style.marginTop = '8px';
                    cardNoteWrap.style.width = '100%';
                    cardNoteWrap.innerHTML = `<input type="text" placeholder="Ваш коментар..." value="${currentNote}" style="width: 100%; background: var(--bg-color); border: 1px dashed var(--accent); border-radius: 6px; padding: 4px 8px; font-size: 11px; color: var(--text-main); outline: none;">`;
                    
                    const cardNoteInput = cardNoteWrap.querySelector('input');
                    cardNoteInput.onclick = (e) => e.stopPropagation();
                    
                    // Зберігаємо на кожному подиху
                    cardNoteInput.oninput = (e) => {
                        if (selectedItems[itemId]) {
                            selectedItems[itemId].note = e.target.value;
                            saveData(); 
                            updateReport();
                        }
                    };
                    
                    // 🟢 МАГІЯ: Залізобетонно фіксуємо і перерендеримо звіт, коли сховали клавіатуру
                    cardNoteInput.onblur = (e) => {
                        if (selectedItems[itemId]) {
                            selectedItems[itemId].note = e.target.value;
                            saveAndRender(); // М'яко оновлює весь інтерфейс
                        }
                    };
                    
                    btn.appendChild(cardNoteWrap);
                }

                currentGrid.appendChild(btn);



                scaleDiv.appendChild(scaleRow);

                btn.appendChild(scaleDiv);
                currentGrid.appendChild(btn);
            });

            contentDiv.appendChild(containerWrap);

           // МАГІЯ: Перевіряємо, чи є в цій категорії хоча б одна звичайна кнопка (не шкала)
            const hasRegularItems = blockData.items.some(i => i.type === 'item');

            // Створюємо обгортку, тільки якщо є звичайні кнопки АБО вже є збережені кастомні теги
            if (hasRegularItems || customArr.length > 0) {
                const customWrap = document.createElement('div');
                customWrap.className = 'custom-items-wrap';

                // Малюємо вже існуючі кастомні теги (якщо вони є)
                if (customArr.length > 0) {
                    const tagsDiv = document.createElement('div');
                    tagsDiv.className = 'custom-tags-list';
                    customArr.forEach((txt, idx) => {
                        const tag = document.createElement('div');
                        tag.className = 'custom-tag active';
                        tag.innerHTML = `${txt} <span>✕</span>`;
                        tag.onclick = () => {
                            customArr.splice(idx, 1);
                            if(customArr.length === 0) delete selectedItems[`custom_${category}`];
                            else selectedItems[`custom_${category}`] = customArr;
                            saveAndRender();
                        };
                        tagsDiv.appendChild(tag);
                    });
                    customWrap.appendChild(tagsDiv);
                }

                // Малюємо кнопку-тригер "➕ додати свій", яка перетворюється на поле
               // Малюємо МІНІМАЛІСТИЧНЕ поле вводу З КНОПКОЮ ➕ (тільки там, де є звичайні кнопки)
                if (hasRegularItems) {
                    const inputDiv = document.createElement('div');
                    inputDiv.style.display = 'flex';
                    inputDiv.style.gap = '6px';
                    inputDiv.style.marginTop = '6px';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = 'Свій варіант...';
                    input.style.flex = '1';
                    input.style.background = 'transparent';
                    input.style.border = '1px dashed var(--border)';
                    input.style.borderRadius = '8px';
                    input.style.padding = '6px 10px';
                    input.style.fontSize = '12px';
                    input.style.color = 'var(--text-main)';
                    input.style.outline = 'none';
                    input.style.opacity = '0.6';
                    input.style.transition = 'all 0.2s';
                    
                    // Підсвічуємо поле, коли клікаємо всередину
                    input.onfocus = () => { input.style.opacity = '1'; input.style.borderColor = 'var(--accent)'; };
                    // Підсвічуємо поле, коли клікаємо всередину
                    input.onfocus = () => { input.style.opacity = '1'; input.style.borderColor = 'var(--accent)'; };
                    
                    // 🟢 МАГІЯ: Автоматично додаємо тег, коли прибираємо фокус (натиснули "Готово" на телефоні або клікнули повз)
                    input.onblur = () => { 
                        input.style.opacity = '0.6'; 
                        input.style.borderColor = 'var(--border)'; 
                        addFunc(); // Авто-додавання!
                    };

                    // Мінімалістична кнопка "+"
                    const addBtn = document.createElement('button');
                    addBtn.innerText = '➕';
                    addBtn.style.background = 'transparent';
                    addBtn.style.border = '1px dashed var(--border)';
                    addBtn.style.borderRadius = '8px';
                    addBtn.style.width = '34px';
                    addBtn.style.display = 'flex';
                    addBtn.style.alignItems = 'center';
                    addBtn.style.justifyContent = 'center';
                    addBtn.style.cursor = 'pointer';
                    addBtn.style.opacity = '0.6';
                    addBtn.style.transition = 'all 0.2s';
                    
                    // Підсвічуємо кнопку при наведенні
                    addBtn.onmouseenter = () => { addBtn.style.opacity = '1'; addBtn.style.borderColor = 'var(--accent)'; };
                    addBtn.onmouseleave = () => { addBtn.style.opacity = '0.6'; addBtn.style.borderColor = 'var(--border)'; };

                    const addFunc = () => {
                        const val = input.value.trim();
                        if (val) {
                            if (!selectedItems[`custom_${category}`]) selectedItems[`custom_${category}`] = [];
                            if (!selectedItems[`custom_${category}`].includes(val)) {
                                selectedItems[`custom_${category}`].push(val);
                                saveAndRender();
                            }
                        }
                    };
                    
                    addBtn.onclick = addFunc;
                    input.onkeypress = (e) => { if(e.key === 'Enter') { e.preventDefault(); addFunc(); } };

                    inputDiv.appendChild(input);
                    inputDiv.appendChild(addBtn);
                    customWrap.appendChild(inputDiv);
                }

                contentDiv.appendChild(customWrap);
            }



            // Видаляємо порожні підзаголовки і АВТОМАТИЧНО відкриваємо ті, де є знайдені практики
            containerWrap.querySelectorAll('.subheader-wrap').forEach(wrap => {
                const hasActiveChecked = wrap.dataset.hasActiveChecked === "true";
                const isEmpty = wrap.querySelector('.grid-unified.sub-content').children.length === 0;

                // 🟢 Якщо група порожня АЛЕ в ній є виконана практика — ми її НЕ видаляємо!
                if (isEmpty && !hasActiveChecked) {
                    wrap.remove();
                } else if (isFilteringActive) {
                    wrap.classList.remove('collapsed'); // 🟢 ВИПРАВЛЕНО: Розгортаємо автоматично ТІЛЬКИ при роботі фільтра!
                }
            });



            block.appendChild(contentDiv);
            container.appendChild(block);
        });
        updateReport();
    }

    function toggleItem(id, category, name, parent) {
        if (selectedItems[id]) delete selectedItems[id]; 
        else selectedItems[id] = { category, name, parent: parent || null, scale: null, mods: [] };
        saveAndRender();
    }

    function setScale(id, category, name, scaleNum, parent) {
        if (!selectedItems[id]) selectedItems[id] = { category, name, parent: parent || null, scale: scaleNum, mods: [] };
        else selectedItems[id].scale = (selectedItems[id].scale === scaleNum) ? null : scaleNum;
        saveAndRender();
    }

    function toggleMod(id, category, name, modVal, parent) {
        if (!selectedItems[id]) {
            selectedItems[id] = { category, name, parent: parent || null, scale: null, mods: [modVal] };
        } else {
            if (!selectedItems[id].mods) selectedItems[id].mods = [];
            const idx = selectedItems[id].mods.indexOf(modVal);
            if (idx > -1) selectedItems[id].mods.splice(idx, 1);
            else selectedItems[id].mods.push(modVal);
        }
        saveAndRender();
    }




    function updateScaleSlider(category, val, sliderEl) {
        const items = findScaleItems(category);
        if(!items.length) return;
        
        const idx = parseInt(val);
        const it = items[idx];
        const formattedNum = it.number > 0 ? `+${it.number}` : it.number;
        
        selectedItems[`scaleCat_${category}`] = { category, index: idx, text: formattedNum };
        
        // Оновлюємо текст і показуємо блок
        const valSpan = document.getElementById(`float-val-scaleCat_${category}`);
        if(valSpan) {
            valSpan.innerText = it.label ? it.label.replace(/^[-—–:]\s*/, '') : '';
            valSpan.style.display = 'block'; // ЗМІНЕНО: тепер просто показуємо блок
        }
        
        const widget = sliderEl ? sliderEl.closest('.global-scale-widget') : null;
        if(widget) {
            widget.classList.add('active');
            const clearBtn = widget.querySelector('.clear-btn');
            if(clearBtn) clearBtn.style.visibility = 'visible';
        }

        // Анімація двостороннього заповнення (рух тексту ВИДАЛЕНО)
        if (sliderEl) {
            const maxIdx = items.length - 1;
            const centerIdx = Math.floor(maxIdx / 2);
            const percent = (idx / maxIdx) * 100;
            const centerPercent = (centerIdx / maxIdx) * 100;
            
            const fillStart = Math.min(percent, centerPercent);
            const fillEnd = Math.max(percent, centerPercent);
            
            sliderEl.style.background = `linear-gradient(to right, var(--border) ${fillStart}%, var(--accent) ${fillStart}%, var(--accent) ${fillEnd}%, var(--border) ${fillEnd}%)`;
            sliderEl.style.border = "1px solid var(--accent)";
        }

        updateReport();
    }



    function clearScaleCat(category, event) {
        event.stopPropagation();
        delete selectedItems[`scaleCat_${category}`];
        saveAndRender();
    }

function saveAndRender() {
        saveData();
        
        // МАГІЯ ТУТ: Жорстко фіксуємо висоту контейнера перед перемальовкою
        const container = document.getElementById('app-container');
        container.style.minHeight = container.offsetHeight + 'px';
        const currentScroll = window.scrollY;

        const expandedIds = Array.from(document.querySelectorAll('.category-block.expanded')).map(el => el.id);
        const expandedSubgroups = Array.from(document.querySelectorAll('.subheader-wrap:not(.collapsed) .subheader-title span:first-child')).map(el => el.innerText);

        renderApp();
        
        document.querySelectorAll('.category-block').forEach(block => {
            if (expandedIds.includes(block.id)) block.classList.add('expanded');
        });
        document.querySelectorAll('.subheader-wrap').forEach(wrap => {
            const title = wrap.querySelector('.subheader-title span:first-child').innerText;
            if (expandedSubgroups.includes(title)) wrap.classList.remove('collapsed');
        });

        const query = document.getElementById('search-input').value;
        if(query) { filterItems(); }
        
        // Тримаємо скрол на місці
        window.scrollTo(0, currentScroll);

        // Знімаємо фіксацію висоти, коли браузер все відмалював
        requestAnimationFrame(() => {
            container.style.minHeight = 'auto';
        });
    }




    function saveData() { 
        localStorage.setItem('trackerData_v7', JSON.stringify(selectedItems)); 
        localStorage.setItem('trackerTime_v7', document.getElementById('log-time').value);
        isEdited = true; // 🟢 Фіксуємо, що ти щось змінив
    }

    function toggleAlign(event) {
        if(event) event.stopPropagation();
        isAligned = !isAligned;
        localStorage.setItem('trackerAlign', isAligned);
        const btn = document.getElementById('align-toggle');
        if(isAligned) btn.classList.add('active-toggle'); else btn.classList.remove('active-toggle');
        updateReport();
    }

function updateReport() {
        let scalesResult = [];
        let othersResult = [];
        let maxScaleLen = 0;
        let maxOtherLen = 0;
        let totalCount = 0;

      function processScale(title, isDelta = false) {
            const stateId = isDelta ? `deltaCat_${title}` : `scaleCat_${title}`;
            const state = selectedItems[stateId];
            if (state) {
                const items = findScaleItems(title);
                if (items && items.length > 0) {
                    let reportText = "";
                    
                    if (isDelta) {
                        // 🟢 ВИПРАВЛЕНО: Малюємо стрілку ТІЛЬКИ якщо фізично торкалися бігунка OUT
                        if (state.outTouched) {
                            let inStr = state.inText; if (inStr === "0" || inStr === 0) inStr = " 0";
                            let outStr = state.outText; if (outStr === "0" || outStr === 0) outStr = " 0";
                            reportText = `${inStr} → ${outStr}`;
                        } else {
                            // Якщо OUT не чіпали, поводимося як звичайна шкала (тільки IN)
                            let numStr = state.inText; if (numStr === "0" || numStr === 0) numStr = " 0";
                            // 🟢 ВИПРАВЛЕНО: Прибрали вивід тексту/символів. Тепер у звіт йде ТІЛЬКИ цифра.
                            reportText = numStr; 
                        }
                    } else {
                        // Логіка для звичайних шкал
                        let numStr = state.text; if (numStr === "0" || numStr === 0) numStr = " 0";
                        // 🟢 ВИПРАВЛЕНО: Тепер у звіт йде ТІЛЬКИ цифра.
                        reportText = numStr; 
                    }
                    
                    if (state.note && state.note.trim() !== "") reportText += ` *"${state.note.trim()}"*`;
                    scalesResult.push({ cat: title, text: reportText });
                    if (title.length > maxScaleLen) maxScaleLen = title.length;
                    totalCount++;
                }
            }
        }





        parsedBlocks.forEach(block => {
            if (block.type !== 'category' && block.type !== 'scale-category' && block.type !== 'delta-category') return;
            const category = block.title;

            if (block.type === 'scale-category') {
                processScale(category, false);
            } else if (block.type === 'delta-category') {
                processScale(category, true);
            } else {
                // Скануємо вбудовані шкали всередині звичайної категорії
                block.items.forEach(item => {
                    if (item.type === 'inline-scale') processScale(item.title, false);
                    if (item.type === 'inline-delta') processScale(item.title, true);
                });

                // Скануємо звичайні елементи

                // Скануємо звичайні елементи
                // 🟢 РОЗУМНЕ ГРУПУВАННЯ ВКЛАДЕНИХ ПРАКТИК (через "+")
                let catParts = [];
                const itemsInCat = Object.values(selectedItems).filter(i => i.category === category);
                
                if (itemsInCat.length > 0) {
                    // 1. Розділяємо на самостійні елементи та елементи з батьками
                    let standaloneParts = [];
                    let groupedByParent = {};

                    itemsInCat.forEach(i => {
                        let prefix = (i.mods && i.mods.length > 0) ? i.mods.join('.') + '.' : '';
                        let suffix = i.scale ? (isNaN(i.scale) ? ` (${i.scale})` : `.${i.scale}`) : '';
                        let noteStr = (i.note && i.note.trim() !== "") ? ` *"${i.note.trim()}"*` : '';
                        
                        let coreName = `${prefix}${i.name}${suffix}${noteStr}`;

                        if (i.parent) {
                            // Очищаємо назву батька від можливих зірочок на всякий випадок
                            let cleanParent = i.parent.replace(/\*/g, '').trim();
                            if (!groupedByParent[cleanParent]) groupedByParent[cleanParent] = [];
                            groupedByParent[cleanParent].push(coreName);
                        } else {
                            standaloneParts.push(coreName);
                        }
                    });

                    // 2. Збираємо кастомні рядки для груп: "Pranayama: nadi.shodhana + anuloma.viloma"
                    for (let parentName in groupedByParent) {
                        let childrenString = groupedByParent[parentName].join(' + ');
                        standaloneParts.push(`${parentName}: ${childrenString}`);
                    }

                    catParts.push(...standaloneParts);
                    totalCount += itemsInCat.length;
                }
                
               const customArr = selectedItems[`custom_${category}`] || [];
                if (customArr.length > 0) {
                    // ЗМІНЕНО: тепер буде додаватися *_текст_*
                    const customMapped = customArr.map(c => `*_${c}_*`);
                    catParts.push(...customMapped);
                    totalCount += customMapped.length;
                }

                if (catParts.length > 0) {
                    othersResult.push({ cat: category, text: catParts.join(" | ") });
                    if (category.length > maxOtherLen) maxOtherLen = category.length;
                }
            }
        });

        
        // 🟢 ВИРІЗАЄМО ДАТУ ДЛЯ ЗВІТУ (Залишаємо тільки час)
        let fullDateTime = document.getElementById('log-time').value || getFormattedDateTime();
        let timeVal = fullDateTime.includes('T') ? fullDateTime.split('T')[1] : fullDateTime; 
        
        // 🟢 ФОРМУЄМО ДАТУ ТА ЧАС ДЛЯ ЗВІТУ
        // 🟢 ФОРМУЄМО ДАТУ ТА ЧАС ДЛЯ ЗВІТУ
        let datePrefix = "";
        if (logDateOffset === -1) datePrefix = "Вчора ";
        else if (logDateOffset < -1) {
            const d = new Date(); d.setDate(d.getDate() + logDateOffset);
            datePrefix = d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' }) + " ";
        }
        
        // 🟢 БЕРЕМО СВІЖИЙ ЧАС ПРЯМО З ГОДИННИКА
        const timeInput = document.getElementById('log-time');
        let timeStr = (timeInput && timeInput.value) ? timeInput.value : (logTimeValue || getFormattedTime());
        
        let displayText = `<strong>${datePrefix}${timeStr}</strong>\n`;
        let copyText = `**${datePrefix}${timeStr}**\n`;
        
        if (isAligned) {
            scalesResult.forEach(s => { 
                const pad = ' '.repeat(Math.max(0, maxScaleLen - s.cat.length));
                displayText += `<strong>${s.cat}</strong>${pad} ${s.text}\n`; 
                copyText += `**${s.cat}**${pad} ${s.text}\n`; 
            });
            othersResult.forEach(s => { 
                const pad = ' '.repeat(Math.max(0, maxOtherLen - s.cat.length));
                displayText += `<strong>${s.cat}</strong>${pad} ${s.text}\n`; 
                copyText += `**${s.cat}**${pad} ${s.text}\n`; 
            });
        } else {
            scalesResult.forEach(s => { 
                displayText += `<strong>${s.cat}</strong> ${s.text}\n`; 
                copyText += `**${s.cat}** ${s.text}\n`; 
            });
            othersResult.forEach(s => { 
                displayText += `<strong>${s.cat}</strong> ${s.text}\n`; 
                copyText += `**${s.cat}** ${s.text}\n`; 
            });
        }

        const reportEl = document.getElementById('report');
        if (reportEl) {
            reportEl.innerHTML = displayText.trim(); 
            reportEl.dataset.copyText = copyText.trim(); 
        }
        
        const totalEl = document.getElementById('total-selected');
        if (totalEl) totalEl.innerText = totalCount;
        
        const fabCount = document.getElementById('fab-count');
        if (fabCount) fabCount.innerText = totalCount;
    }




    function filterItems() {
        const searchInput = document.getElementById('search-input');
        if (!searchInput) return;
        
        const query = searchInput.value.toLowerCase().trim();
        const isSearching = query.length > 0;
        
        // Показуємо або ховаємо хрестик очищення
        document.getElementById('clear-search-btn').style.display = isSearching ? 'block' : 'none';

        // Ховаємо текстові блоки та кастомні поля під час пошуку
        document.querySelectorAll('.md-quote').forEach(quote => {
            quote.style.display = isSearching ? 'none' : 'block';
        });
        document.querySelectorAll('.custom-items-wrap').forEach(w => {
            w.style.display = isSearching ? 'none' : 'block';
        });

        document.querySelectorAll('.category-block').forEach(block => {
            let hasVisibleInBlock = false;

            // 1. Якщо цей блок - це просто Глобальна Шкала (без підкатегорій)
            if (block.classList.contains('global-scale-widget') && !block.classList.contains('inline-scale-widget')) {
                if (isSearching) {
                    const match = block.dataset.searchText && block.dataset.searchText.toLowerCase().includes(query);
                    block.style.display = match ? 'block' : 'none';
                } else {
                    block.style.display = 'block';
                }
                return; // Йдемо до наступного блоку
            }

            // 2. Звичайні кнопки (.option-btn)
            block.querySelectorAll('.option-btn').forEach(item => {
                if (isSearching) {
                    // Шукаємо навіть по прихованому тексту ⓘ
                    if (item.textContent.toLowerCase().includes(query)) {
                        item.style.display = 'flex';
                        hasVisibleInBlock = true;
                    } else {
                        item.style.display = 'none';
                    }
                } else {
                    if (item.classList.contains('smart-hidden')) {
                        item.style.display = 'none';
                    } else {
                        item.style.display = 'flex';
                        hasVisibleInBlock = true;
                    }
                }
            });

            // 3. Вбудовані шкали (.inline-scale-widget)
            block.querySelectorAll('.inline-scale-widget').forEach(scale => {
                if (isSearching) {
                    const match = scale.dataset.searchText && scale.dataset.searchText.toLowerCase().includes(query);
                    if (match) {
                        scale.style.display = 'block';
                        hasVisibleInBlock = true;
                    } else {
                        scale.style.display = 'none';
                    }
                } else {
                    scale.style.display = 'block';
                    hasVisibleInBlock = true;
                }
            });

            // 4. Підзаголовки (###)
            block.querySelectorAll('.subheader-wrap').forEach(wrap => {
                if (isSearching) {
                    // Перевіряємо чи є хоч одна видима кнопка або шкала всередині ЦІЄЇ підкатегорії
                    const visibleBtns = Array.from(wrap.querySelectorAll('.option-btn')).some(btn => btn.style.display !== 'none');
                    const visibleScales = Array.from(wrap.querySelectorAll('.inline-scale-widget')).some(s => s.style.display !== 'none');
                    
                    if (visibleBtns || visibleScales) {
                        wrap.style.display = 'block'; // Показуємо групу
                        wrap.classList.remove('collapsed'); // АВТО-РОЗГОРТАЄМО її
                    } else {
                        wrap.style.display = 'none'; // Повністю ховаємо, якщо там немає збігів
                    }
                } else {
                    wrap.style.display = 'block';
                    wrap.classList.add('collapsed'); // Згортаємо назад при очищенні пошуку
                }
            });

           // 5. Коментарі (####) та Міні-заголовки
            block.querySelectorAll('.category-comment, .mini-header').forEach(c => { 
                c.style.display = isSearching ? 'none' : 'block'; 
            });

            // 6. Видимість та авто-розгортання Головного Блоку Категорії (#)
            if (isSearching) {
                if (hasVisibleInBlock) {
                    block.style.display = 'block';
                    block.classList.add('expanded'); // Розгортаємо головну категорію
                } else {
                    block.style.display = 'none'; // Ховаємо, якщо порожня
                }
            } else {
                block.style.display = 'block';
                block.classList.remove('expanded'); // Згортаємо назад
            }
        });
    }

    function clearSearch() {
        document.getElementById('search-input').value = '';
        filterItems();
    }

    function toggleReportPanel() {
        const panel = document.getElementById('report-panel');
        const fab = document.getElementById('report-fab');
        const isOpen = panel.classList.toggle('open');
        
        if (isOpen) {
            fab.classList.add('hidden');
        } else {
            fab.classList.remove('hidden');
        }
    }
    
    function clearData() { 
        if (Object.keys(selectedItems).length > 0 && isEdited) { // 🟢 Зберігає в бекап ТІЛЬКИ якщо були реальні зміни
            let history = JSON.parse(localStorage.getItem('trackerHistory') || '[]');
            history = history.filter(h => h.sessionId !== currentSessionId);
            
            history.unshift({
                items: selectedItems,
                sessionId: currentSessionId,
                time: logTimeValue,
                dateOffset: logDateOffset // Зберігаємо зсув дати
            });
            if (history.length > 15) history.pop();
            localStorage.setItem('trackerHistory', JSON.stringify(history));
        }

        selectedItems = {}; 
        currentSessionId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        historyDepth = 0; 
        
        // 🟢 Скидаємо годинник на "Сьогодні" та поточний час
        logDateOffset = 0;
        logTimeValue = getFormattedTime();
        
        const timeInput = document.getElementById('log-time');
        if (timeInput) timeInput.value = logTimeValue;
        
        updateDateDisplay();
        localStorage.setItem('trackerTime_v7', logTimeValue);
        
        saveData(); 
        document.getElementById('search-input').value = ""; 
        filterItems(); 
        renderApp(); 
        isEdited = false; // 🟢 Скидаємо прапорець для нової порожньої сесії
    }

    // 🟢 ДОДАНО: Функція відновлення
    function restoreBackup() {
        const history = JSON.parse(localStorage.getItem('trackerHistory') || '[]');
        if (history.length === 0) { alert("Історія порожня!"); return; }
        if (historyDepth >= history.length) { historyDepth = 0; alert("Починаємо з початку історії 🔄"); }

        const backup = history[historyDepth];
        selectedItems = backup.items;
        currentSessionId = backup.sessionId; 
        
        // 🟢 РОЗУМНЕ ВІДНОВЛЕННЯ ЧАСУ ТА ДАТИ (Навіть із Google Sheets)
        if (backup.time) {
            if (backup.time.includes('T')) {
                // Якщо це бекап з Google (формат YYYY-MM-DDTHH:MM)
                const parts = backup.time.split('T');
                logTimeValue = parts[1]; // Забираємо тільки HH:MM
                
                // Розраховуємо, скільки днів тому це було
                const today = new Date(); today.setHours(0,0,0,0);
                const backupDate = new Date(parts[0]); backupDate.setHours(0,0,0,0);
                const diffDays = Math.round((backupDate - today) / (1000 * 60 * 60 * 24));
                logDateOffset = diffDays > 0 ? 0 : diffDays; 
            } else {
                // Якщо це свіжий локальний бекап
                logTimeValue = backup.time;
                logDateOffset = backup.dateOffset !== undefined ? backup.dateOffset : 0;
            }

            // Оновлюємо годинник та стрілочки в інтерфейсі
            const timeInput = document.getElementById('log-time');
            if (timeInput) timeInput.value = logTimeValue;
            updateDateDisplay();
        }

        historyDepth++; 
        saveAndRender();
        isEdited = false; // 🟢 МАГІЯ: Відновлений бекап НЕ вважається новим, поки ти сам щось у ньому не клацнеш!
    }

    function copyReport(e) {
        if(e) e.stopPropagation();
        const reportEl = document.getElementById('report');
        const textToCopy = reportEl.dataset.copyText;
        if (!textToCopy) return;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.querySelector('.copy-btn-panel');
            if(btn) {
                const orig = btn.innerText;
                btn.innerText = "✅"; btn.style.backgroundColor = "#34c759"; btn.style.color = "white"; btn.style.borderColor = "#34c759";
                setTimeout(() => { btn.innerText = orig; btn.style.backgroundColor = ""; btn.style.color = ""; btn.style.borderColor = "";}, 1500);
            }
            const miniBtn = document.querySelector('.copy-btn-mini');
            if(miniBtn) {
                miniBtn.innerText = "✅";
                setTimeout(() => { miniBtn.innerText = "📋"; }, 1500);
            }
        });
    }

    const scrollBtn = document.getElementById('scroll-btn');
    window.onscroll = function() {
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) { scrollBtn.classList.add('visible'); } 
        else { scrollBtn.classList.remove('visible'); }
    };
    function scrollToActive() {
        const expandedBlock = document.querySelector('.category-block.expanded');
        if (expandedBlock) {
            const y = expandedBlock.getBoundingClientRect().top + window.scrollY - 80;
            window.scrollTo({ top: y, behavior: 'smooth' });
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwoqHUNfFEFXRJ6bzNjLyFaaHLXEKjJqQi6zvMHzajFzpDw1THCWTbpJjfjqabGXH6DHQ/exec';

 function sendToCloud(event) {
        if (event) event.stopPropagation();
        
        const btn = event.currentTarget;
        if (!btn) return;
        
        const reportEl = document.getElementById('report');
        const reportText = reportEl.dataset.copyText || "";
        const rawData = JSON.stringify(selectedItems); 
        
        if (!reportText) {
            alert("Звіт порожній. Спочатку обери стани!");
            return;
        }

        const isMini = btn.classList.contains('send-cloud-btn-mini');
        const origText = btn.innerHTML;
        
        btn.innerHTML = isMini ? "⏳" : "⏳ ...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('report', reportText);
        formData.append('rawData', rawData);
        formData.append('sessionId', currentSessionId); 
        formData.append('logTime', getFullLogDateTimeForSheets()); // 🟢 Ідеальний час

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData
        })
        .then(res => res.text())
        .then(text => {
            if (text.startsWith("Error")) { throw new Error(text); }
            
            btn.innerHTML = isMini ? "✅" : "✅";
            btn.style.backgroundColor = isMini ? "transparent" : "#34c759";
            btn.style.color = isMini ? "#34c759" : "white";
            if (!isMini) btn.style.borderColor = "#34c759";
            
            clearData(); // Очищуємо екран (і генеруємо новий Session ID всередині clearData)
            
            setTimeout(() => { 
                btn.innerHTML = origText; 
                btn.style.backgroundColor = ""; 
                btn.style.color = ""; 
                btn.style.borderColor = "";
                btn.disabled = false;
            }, 2500); // 2.5 секунди, щоб ти встиг побачити зелену галочку успіху
        })
        .catch(err => {
            btn.innerHTML = isMini ? "❌" : "❌ Помилка";
            btn.style.backgroundColor = isMini ? "transparent" : "#ff3b30";
            btn.style.color = isMini ? "#ff3b30" : "white";
            setTimeout(() => { 
                btn.innerHTML = origText; 
                btn.style.backgroundColor = ""; 
                btn.style.color = ""; 
                btn.disabled = false; 
            }, 2500);
            console.error(err);
        });
    }

    function copyAndSendToCloud(event) {
        if (event) event.stopPropagation();
        
        const btn = event.currentTarget;
        const reportEl = document.getElementById('report');
        const textToCopy = reportEl.dataset.copyText || "";
        const rawData = JSON.stringify(selectedItems); 
        
        if (!textToCopy) {
            alert("Звіт порожній. Спочатку обери стани!");
            return;
        }

        const origText = btn.innerHTML;
        btn.innerHTML = "⏳";

        // 1. Копіюємо текст у буфер обміну
        navigator.clipboard.writeText(textToCopy).catch(err => console.error("Помилка копіювання", err));

        const formData = new FormData();
        formData.append('report', textToCopy);
        formData.append('rawData', rawData);
        formData.append('sessionId', currentSessionId); 
        formData.append('logTime', getFullLogDateTimeForSheets()); // 🟢 Ідеальний час

        // 2. ВІДПРАВЛЯЄМО В GOOGLE З ПРАПОРЦЕМ KEEPALIVE (Фоновий режим гарантовано)
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData,
            keepalive: true // 🟢 МАГІЯ: iOS не вб'є цей запит при переході в Шорткати
        }).catch(err => console.error("Помилка фонової відправки", err));

       
        // 3. БЛИСКАВИЧНИЙ ЗАПУСК ШОРТКАТУ (Розділяємо iOS та Mac)
        if (isShortcutEnabled) {
            // Точно визначаємо, з якого пристрою ми сидимо
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isMac = /Mac/i.test(navigator.platform) && !isIOS;

            let targetShortcut = "";
            if (isIOS) {
                targetShortcut = "u-track-log";
            } else if (isMac) {
                targetShortcut = "u-track-log-mac";
            }

            // Якщо це пристрій Apple, запускаємо відповідну команду
            if (targetShortcut) {
                const shortcutName = encodeURIComponent(targetShortcut); 
                window.location.href = `shortcuts://run-shortcut?name=${shortcutName}`;
            } else {
                console.log("Запуск пропущено: шорткати підтримуються тільки на Apple");
            }
        }

        // 4. Миттєво очищуємо трекер
        btn.innerHTML = "✅"; 
        btn.style.color = "#34c759";
        clearData(); 

        // Повертаємо іконку назад
        setTimeout(() => { 
            btn.innerHTML = origText; 
            btn.style.color = ""; 
        }, 1000);
    }

    // 🟢 ПРОКИДАННЯ ДОДАТКУ (Оновлення завислого часу з фону)
    function wakeUpTime() {
        // Якщо трекер чистий (без обраних станів), ставимо актуальний поточний час!
        if (Object.keys(selectedItems).length === 0 && !isEdited) {
            logDateOffset = 0;
            logTimeValue = getFormattedTime();
            const timeInput = document.getElementById('log-time');
            if (timeInput) timeInput.value = logTimeValue;
            updateDateDisplay();
            updateReport();
        }
    }

    document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'visible') wakeUpTime();
    });
    // 🎯 ФІКС ДЛЯ iOS: iPhone часто ігнорує visibilitychange, але ідеально реагує на 'focus'
    window.addEventListener("focus", wakeUpTime);

    initApp(); 
</script>
