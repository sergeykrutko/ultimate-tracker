<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-desc: #8e8e93;
            --accent: #007aff;
            --accent-light: #e5f1ff;
            --border: #d1d1d6;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); margin: 0; padding-bottom: 180px; color: var(--text-main); }
        .wrapper { max-width: 600px; margin: 0 auto; }

        .header-container {
            position: sticky; top: 0; z-index: 10; background: var(--bg-color);
            padding: 16px 16px 10px; border-bottom: 1px solid var(--border);
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .clear-btn { color: var(--accent); background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px 0; }

        .search-bar {
            width: 100%; background: #e3e3e8; border: none; border-radius: 10px;
            padding: 10px 14px; font-size: 16px; color: var(--text-main); outline: none;
        }
        .search-bar::placeholder { color: #8e8e93; }

        .container { padding: 10px 16px; }
        .category-block { margin-bottom: 16px; }
        .category-title { font-size: 18px; font-weight: 700; margin: 10px 0; text-transform: lowercase; }
        .subheader { font-size: 14px; font-weight: 600; color: var(--text-desc); margin: 12px 0 6px; grid-column: 1 / -1; }

        /* Звичайні категорії */
        .grid-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .grid-compact { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; }

        .option-btn {
            background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 10px; cursor: pointer;
            transition: all 0.15s ease; -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column; justify-content: center;
        }
        .option-btn.active { background-color: var(--accent-light); border-color: var(--accent); }
        .option-name { font-size: 15px; font-weight: 600; color: var(--text-main); margin-bottom: 2px;}
        .option-btn.active .option-name { color: var(--accent); }
        .option-desc { font-size: 13px; color: var(--text-desc); line-height: 1.2; }

        .scale-container { display: none; margin-top: 8px; justify-content: space-between; gap: 2px; }
        .option-btn.active .scale-container { display: flex; }
        
        .scale-btn {
            width: 100%; aspect-ratio: 1; max-height: 24px; border-radius: 6px;
            background: var(--card-bg); border: 1px solid var(--accent);
            color: var(--accent); font-size: 12px; font-weight: 700; 
            display: flex; align-items: center; justify-content: center;
        }
        .scale-btn.selected { background: var(--accent); color: white; }

        /* Глобальна Шкала (Повзунок) */
        .global-scale-widget {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; transition: border-color 0.2s;
        }
        .global-scale-widget.active { border-color: var(--accent); background: var(--accent-light); }
        .global-scale-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .global-scale-value { font-size: 16px; font-weight: 600; color: var(--accent); }
        .global-scale-value.empty { color: var(--text-desc); font-weight: 500; font-style: italic; }
        
        .global-slider {
            width: 100%; -webkit-appearance: none; height: 6px;
            background: #d1d1d6; border-radius: 3px; outline: none; margin-bottom: 10px;
        }
        .global-scale-widget.active .global-slider { background: #a8d1ff; }
        .global-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 26px; height: 26px;
            background: #fff; border: 1px solid #c7c7cc; border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15); cursor: pointer;
        }
        .global-scale-widget.active .global-slider::-webkit-slider-thumb { border: 2px solid var(--accent); }
        
        .global-slider-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--text-desc); }

        /* Нижня панель */
        .bottom-panel-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--card-bg); border-top: 1px solid var(--border); z-index: 100;
        }
        .bottom-panel { max-width: 600px; margin: 0 auto; padding: 12px 16px; padding-bottom: env(safe-area-inset-bottom, 12px); }

        .report-area {
            width: 100%; height: 70px; border: 1px solid var(--border);
            border-radius: 8px; padding: 8px; font-size: 13px;
            background-color: var(--bg-color); resize: none; margin-bottom: 8px;
            color: var(--text-main); font-family: monospace;
        }
        .copy-btn {
            width: 100%; background-color: var(--accent); color: white;
            border: none; border-radius: 10px; padding: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-container">
        <div class="header-top">
            <h1>Трекер</h1>
            <button class="clear-btn" onclick="clearData()">Очистити</button>
        </div>
        <input type="text" class="search-bar" id="search-input" onkeyup="filterItems()" placeholder="Пошук (наприклад, joy або belly)...">
    </div>
    <div class="container" id="app-container"></div>
</div>

<div class="bottom-panel-wrapper">
    <div class="bottom-panel">
        <textarea id="report" class="report-area" readonly></textarea>
        <button class="copy-btn" onclick="copyReport()">Скопіювати звіт</button>
    </div>
</div>

<script>
    // === ВАША БАЗА ДАНИХ ===
    // Щоб зробити повзунок, просто додайте [scale] у заголовок категорії
    const rawDatabaseText = `
# emotions
### I. High-Energy Pleasant
- **Amusement** — Веселість/Розвага: приємне, розслаблене збудження.
- **Connection** — Зв'язок: енергія між людьми, коли вони відчувають себе побаченими.
- **Excitement** — Збудження, піднесення: енергійний стан ентузіазму.
- **Joy** — Радість: раптова, несподівана, інтенсивна емоція духовного зв'язку.
- **Surprise** — Сюрприз/Несподіванка: коротке переривання через невідповідність інформації очікуванням.

### II. Low-Energy Pleasant
- **Belonging** — Приналежність: невід'ємна потреба, що вимагає від нас бути тими, ким ми є.
- **Calm** — Внутрішній спокій: створення перспективи та усвідомленості.
- **Love** — Любов: духовний зв'язок, що зростає з вразливості, довіри та прихильності.

# BODY [scale]
- +5 ✨ Radiant
- +4 ⚡ Energized
- +3 🌊 Flowing
- +2 🏹 Engaged
- +1 🌳 Grounded
-  0 ⚖️ Neutral
- -1 🪫 Agitated / Drained
- -2 🪨 Tense / Heavy
- -3 🫨 Frantic / Exhausted
- -4 🧊 Overstimulated / Collapsed
- -5 🫥 Reactive / Shutdown

# tensions
Head
Face
Shoulders
L-Hand
R-Hand
Belly
L-Leg
R-Leg
    `;

    function parseDatabase(text) {
        const lines = text.split('\n');
        const db = {};
        let currentCat = "";

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            // 1. Головна категорія (шукаємо маркер [scale])
            if (line.startsWith('# ')) {
                let catTitle = line.substring(2).trim();
                let isScale = false;
                
                // Якщо є маркер - запам'ятовуємо і прибираємо його з назви
                if (catTitle.toLowerCase().includes('[scale]')) {
                    isScale = true;
                    catTitle = catTitle.replace(/\[scale\]/gi, '').trim();
                }
                
                catTitle = catTitle.replace(/\*/g, '').trim(); // Прибираємо жирний шрифт
                currentCat = catTitle;
                db[currentCat] = { type: isScale ? 'scale-category' : 'mixed', items: [] };
                return;
            }
            
            if (!currentCat) return;

            // 2. Підзаголовок
            if (line.startsWith('## ')) {
                db[currentCat].items.push({ type: 'subheader', title: line.replace(/^#+\s+/, '').trim() });
                return;
            }

            // Очищаємо рядок від маркдауну списків (- або *) і слешів (\)
            let content = line.replace(/^[-*]\s+/, '').replace(/\\/g, '').replace(/\*/g, '').trim();

            // 3. Якщо це категорія ШКАЛИ
            if (db[currentCat].type === 'scale-category') {
                // Витягуємо число на початку і решту тексту
                const scaleMatch = content.match(/^([+-]?\d+)\s+(.+)$/);
                if (scaleMatch) {
                    db[currentCat].items.push({
                        type: 'scale-item',
                        number: parseInt(scaleMatch[1]),
                        label: scaleMatch[2].trim()
                    });
                }
                return;
            }

            // 4. Якщо це звичайний пункт
            let name = content;
            let desc = "";
            const sepMatch = content.match(/[—:]| - /); 
            if (sepMatch) {
                const idx = sepMatch.index;
                name = content.substring(0, idx).trim();
                desc = content.substring(idx + sepMatch[0].length).trim();
            }

            db[currentCat].items.push({ type: 'item', name, desc });
        });

        // Сортуємо елементи шкали, щоб повзунок завжди йшов від мінуса до плюса
        for (const key in db) {
            if (db[key].type === 'scale-category') {
                db[key].items.sort((a, b) => a.number - b.number);
            }
        }

        return db;
    }

    const database = parseDatabase(rawDatabaseText);
    let selectedItems = JSON.parse(localStorage.getItem('trackerData7')) || {};

    function renderApp() {
        const container = document.getElementById('app-container');
        container.innerHTML = '';

        for (const [category, data] of Object.entries(database)) {
            const block = document.createElement('div');
            block.className = 'category-block';
            block.id = `cat-${category.replace(/\s+/g, '-')}`;

            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerText = category;
            block.appendChild(title);

            // РЕНДЕР ПОВЗУНКА
            if (data.type === 'scale-category') {
                const items = data.items;
                if (items.length === 0) continue; // Захист від пустих категорій
                
                const stateId = `scaleCat_${category}`;
                const isSelected = selectedItems[stateId] !== undefined;
                const currentIndex = isSelected ? selectedItems[stateId].index : Math.floor(items.length / 2);

                const widget = document.createElement('div');
                widget.className = `global-scale-widget ${isSelected ? 'active' : ''}`;
                widget.dataset.searchText = items.map(i => i.label.toLowerCase()).join(' ');

                const header = document.createElement('div');
                header.className = 'global-scale-header';
                
                const valSpan = document.createElement('span');
                valSpan.className = `global-scale-value ${!isSelected ? 'empty' : ''}`;
                valSpan.innerText = isSelected 
                    ? `${items[currentIndex].number > 0 ? '+' : ''}${items[currentIndex].number} ${items[currentIndex].label}` 
                    : 'Не вибрано (потягніть бігунок)';

                const clearBtn = document.createElement('button');
                clearBtn.className = 'clear-btn';
                clearBtn.innerText = '✕ Скинути';
                clearBtn.style.display = isSelected ? 'block' : 'none';
                clearBtn.onclick = () => clearScaleCat(category);

                header.appendChild(valSpan);
                header.appendChild(clearBtn);
                widget.appendChild(header);

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = 0;
                slider.max = items.length - 1;
                slider.value = currentIndex;
                slider.className = 'global-slider';
                
                slider.oninput = (e) => {
                    const idx = parseInt(e.target.value);
                    const formattedNum = items[idx].number > 0 ? `+${items[idx].number}` : items[idx].number;
                    const text = `${formattedNum} ${items[idx].label}`;
                    
                    selectedItems[stateId] = { category, index: idx, text: text };
                    
                    widget.classList.add('active');
                    valSpan.innerText = text;
                    valSpan.classList.remove('empty');
                    clearBtn.style.display = 'block';
                    generateReport();
                };
                slider.onchange = () => localStorage.setItem('trackerData7', JSON.stringify(selectedItems));

                widget.appendChild(slider);
                
                const labels = document.createElement('div');
                labels.className = 'global-slider-labels';
                labels.innerHTML = `
                    <span>${items[0].number}</span>
                    <span>${items[Math.floor(items.length/2)].number}</span>
                    <span>+${items[items.length-1].number}</span>
                `;
                widget.appendChild(labels);
                block.appendChild(widget);
            } 
            // РЕНДЕР ЗВИЧАЙНИХ КНОПОК
            else {
                const hasDescriptions = data.items.some(i => i.desc !== "");
                const list = document.createElement('div');
                list.className = hasDescriptions ? 'grid-list' : 'grid-compact';

                data.items.forEach((item) => {
                    if (item.type === 'subheader') {
                        const sub = document.createElement('div');
                        sub.className = 'subheader';
                        sub.innerText = item.title;
                        list.appendChild(sub);
                        return;
                    }

                    const itemId = `${category}|${item.name}`;
                    const isSelected = !!selectedItems[itemId];
                    const currentScale = isSelected ? selectedItems[itemId].scale : null;

                    const btn = document.createElement('div');
                    btn.className = `option-btn ${isSelected ? 'active' : ''}`;
                    
                    let html = `<div onclick="toggleItem('${itemId}', '${category}', '${item.name}')">`;
                    html += `<div class="option-name">${item.name}</div>`;
                    if (item.desc) html += `<div class="option-desc">${item.desc}</div>`;
                    html += `</div>`;
                    
                    html += `<div class="scale-container" onclick="event.stopPropagation();">
                        ${[1,2,3,4,5].map(num => 
                            `<div class="scale-btn ${currentScale === num ? 'selected' : ''}" 
                                  onclick="setScale('${itemId}', '${category}', '${item.name}', ${num})">${num}</div>`
                        ).join('')}
                    </div>`;

                    btn.innerHTML = html;
                    list.appendChild(btn);
                });
                block.appendChild(list);
            }

            container.appendChild(block);
        }
        generateReport();
    }

    function toggleItem(id, category, name) {
        if (selectedItems[id]) { delete selectedItems[id]; } 
        else { selectedItems[id] = { category, name, scale: null }; }
        saveAndRender();
    }

    function setScale(id, category, name, scaleNum) {
        if (!selectedItems[id]) { selectedItems[id] = { category, name, scale: scaleNum }; } 
        else {
            selectedItems[id].scale = (selectedItems[id].scale === scaleNum) ? null : scaleNum;
        }
        saveAndRender();
    }

    function clearScaleCat(category) {
        delete selectedItems[`scaleCat_${category}`];
        saveAndRender();
    }

    function filterItems() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const blocks = document.querySelectorAll('.category-block');

        blocks.forEach(block => {
            let hasVisibleItems = false;
            
            const items = block.querySelectorAll('.option-btn');
            items.forEach(item => {
                if (item.innerText.toLowerCase().includes(query)) {
                    item.style.display = 'flex';
                    hasVisibleItems = true;
                } else { item.style.display = 'none'; }
            });

            const scaleWidget = block.querySelector('.global-scale-widget');
            if (scaleWidget) {
                const searchData = scaleWidget.dataset.searchText + " " + block.querySelector('.category-title').innerText.toLowerCase();
                if (searchData.includes(query)) {
                    scaleWidget.style.display = 'block';
                    hasVisibleItems = true;
                } else { scaleWidget.style.display = 'none'; }
            }

            block.querySelectorAll('.subheader').forEach(sub => { sub.style.display = query ? 'none' : 'block'; });
            block.style.display = hasVisibleItems ? 'block' : 'none';
        });
    }

    function saveAndRender() {
        localStorage.setItem('trackerData7', JSON.stringify(selectedItems));
        const query = document.getElementById('search-input').value;
        renderApp();
        if(query) { document.getElementById('search-input').value = query; filterItems(); }
    }

    function generateReport() {
        let reportText = "";
        
        for (const category of Object.keys(database)) {
            const data = database[category];
            
            if (data.type === 'scale-category') {
                const stateId = `scaleCat_${category}`;
                if (selectedItems[stateId]) {
                    reportText += `**${category}**: ${selectedItems[stateId].text}\n`;
                }
            } else {
                const itemsInCat = Object.values(selectedItems).filter(i => i.category === category);
                if (itemsInCat.length > 0) {
                    const itemsString = itemsInCat.map(i => i.scale ? `${i.name}.${i.scale}` : i.name).join(" | ");
                    reportText += `**${category}** ${itemsString}\n`;
                }
            }
        }
        document.getElementById('report').value = reportText.trim();
    }

    function clearData() {
        selectedItems = {};
        localStorage.removeItem('trackerData7');
        document.getElementById('search-input').value = "";
        renderApp();
    }

    function copyReport() {
        const textarea = document.getElementById('report');
        if (!textarea.value) return;
        textarea.select();
        document.execCommand('copy');
        
        const btn = document.querySelector('.copy-btn');
        const orig = btn.innerText;
        btn.innerText = "✓ Скопійовано!";
        btn.style.backgroundColor = "#34c759";
        setTimeout(() => { btn.innerText = orig; btn.style.backgroundColor = "var(--accent)"; }, 1500);
    }

    renderApp();
</script>
</body>
</html>
